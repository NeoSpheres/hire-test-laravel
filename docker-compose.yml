version: '3.7'

services:
    # Service PHP avec l'interpréteur PHP-FPM
    php:
        image: php:8.0-fpm
        container_name: laravel_php
        volumes:
            - .:/var/www/html
        networks:
            - laravel_network

    # Service Nginx pour servir l'application Laravel
    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        ports:
            - "14200:80"
        volumes:
            - .:/var/www/html
            - ./nginx/config.d/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - laravel_network

    # Service PostgreSQL pour la base de données
    postgresql:
        image: postgres:latest
        container_name: laravel_postgresql
        ports:
            - "14432:5432"
        environment:
            POSTGRES_USER: laravel_user
            POSTGRES_PASSWORD: laravel_password
            POSTGRES_DB: laravel
        volumes:
            - postgresql_data:/var/lib/postgresql/data
        networks:
            - laravel_network

volumes:
    postgresql_data:

networks:
    laravel_network:
