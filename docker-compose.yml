version: '3.8'

services:
    app:
        container_name: laravel
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./:/var/www
        ports:
            - "9000:9000"
        working_dir: /var/www
        depends_on:
            - postgres_db_htl

    postgres_db_htl:
        container_name: db_hire_test_laravel
        image: postgres:16.0
        volumes:
            - ./postgresql/data:/var/lib/postgresql/data
        ports:
            - "14432:5432"
        environment:
            POSTGRES_DB: hire_test_laravel
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "14200:80"
        volumes:
            - ./:/var/www
            - ./nginx/conf.d/:/etc/nginx/conf.d/
        depends_on:
            - app
            - postgres_db_htl

    pgadmin:
        image: dpage/pgadmin4
        container_name: pgAdmin
        ports:
            - "14230:80"
        depends_on:
            - postgres_db_htl
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@admin.com
            PGADMIN_DEFAULT_PASSWORD: password
        volumes:
            - ./servers.json:/pgadmin4/servers.json
