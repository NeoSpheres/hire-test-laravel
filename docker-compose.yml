version: '3'

services:
    php-fpm:
        build:
            context: .  # Chemin du contexte de build
            dockerfile: Dockerfile  # Chemin du Dockerfile
        volumes:
            - ./app:/var/www/html
        networks:
            - laravel-network

    nginx:
        image: nginx:latest
        ports:
            - "14200:80"
        volumes:

            - ./nginx/config.d/default.conf:/etc/nginx/conf.d/default.conf
            - ./app:/var/www/html
        depends_on:
            - php-fpm
        networks:
            - laravel-network

    postgresql:
        image: postgres:latest
        container_name: laravel_postgresql
        ports:
            - "14432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: Bakchlamo@@12345
            POSTGRES_DB: test1
        volumes:
            - postgresql_data:/var/lib/postgresql/data
        networks:
            - laravel-network

volumes:
    postgresql_data:

networks:
    laravel-network:
        driver: bridge
