version: "3.7"

networks:
    app-network:
        driver: bridge

services:
    app:
        container_name: app
        build:
            context: .
            dockerfile: Dockerfile
        image: php-laravel-7.0
        restart: unless-stopped
        tty: true
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - app-network

    db:
        container_name: pgsql
        build:
            context: ./pgsql
            dockerfile: Dockerfile
        image: pgsql-docker
        restart: unless-stopped
        expose:
            - "5432"
        ports:
            - "5433:5432"
        volumes:
            - ./script:/docker-entrypoint-initdb.d
            - ./pgsql/data:/var/lib/postgresql/data
        environment:
            - POSTGRES_PASSWORD=Bakchlamo@@12345
            - POSTGRES_USER=postgres
            - POSTGRES_MULTIPLE_DATABASES=crud_app // you change this
        networks:
            - app-network

    nginx:
        image: nginx:1.19.8-alpine
        container_name: nginx
        restart: unless-stopped
        tty: true
        ports:
            - 8100:80
        volumes:
            - ./nginx/conf:/etc/nginx/conf.d
        networks:
            - app-network
